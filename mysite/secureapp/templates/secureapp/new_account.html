{% extends "secureapp/base.html" %} {% block content %}
<h2>Join — Flaw 1 (No Password Policy)</h2>
{% if error %}
<p style="color: red">{{ error }}</p>
{% endif %}
<form method="post">
  {% csrf_token %} <input name="username" placeholder="Username" /><br /><br />
  <input
    name="password"
    type="password"
    placeholder="Any password accepted"
  /><br /><br />
  <button type="submit">Join</button>
</form>
{% endblock %}
